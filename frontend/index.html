<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#cc0000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>App Tradutor IASD Lagoa</title>
    <link rel="icon" type="image/jpeg" href="/static/icon.jpg" />
    <link rel="apple-touch-icon" href="/static/icon.jpg" />
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="manifest" href="/static/manifest.json" />
<style>
.feedback-box {
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
}
.feedback-label {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    margin: 0 0 0.4rem 0;
}
#feedback-text {
    width: 100%;
    box-sizing: border-box;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 0.4rem;
    font-size: 0.85rem;
    resize: none;
    font-family: inherit;
    color: #fff;
}
#feedback-text::placeholder { color: rgba(255,255,255,0.3); }
#feedback-btn {
    margin-top: 0.4rem;
    width: 100%;
    padding: 0.5rem;
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
}
#feedback-btn:disabled { opacity: 0.4; }
.feedback-status {
    font-size: 0.75rem;
    margin: 0.3rem 0 0 0;
    min-height: 1em;
    color: rgba(255,255,255,0.6);
}
</style>
</head>
<body>
    <div class="container">

        <header class="header">
            <div class="church-info">
                <span class="church-name">IASD LAGOA</span>
                <span class="service-label">Sabbath Service · Live Translation</span>
            </div>
            <span id="status" class="status offline">&#9899; OFFLINE</span>
        </header>

        <main class="transcript-box">
            <p id="transcript" class="waiting">Waiting for the service to begin...</p>
        </main>

        <div class="controls">
            <button id="audio-toggle" class="audio-btn audio-on" onclick="toggleAudio()">
                🔊 Audio ON
            </button>
        </div>

        <div class="instructions">
            <p>&#9432; Keep this page open · Translation appears automatically</p>
            <p>Tap <strong>Audio ON/OFF</strong> to choose how you follow</p>
        </div>

        <div class="feedback-box">
            <p class="feedback-label">&#128172; Need help? Send a message to the operator:</p>
            <textarea id="feedback-text" 
                placeholder="Type your message here... (e.g. No audio, Too fast, Connection issue)"
                maxlength="200"
                rows="2"></textarea>
            <button id="feedback-btn" onclick="sendFeedback()">Send Message</button>
            <p id="feedback-status" class="feedback-status"></p>
        </div>

    </div>
    <script src="/static/script.js"></script>
</body>
</html>
